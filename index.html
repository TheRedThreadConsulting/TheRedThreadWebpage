<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Red Thread Portal</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

/* Gate Background */
body {
  background-image: url("gate.jpg");
  background-size: cover;
  background-position: contain;
  background-repeat: no-repeat;
}

/* Wrapper */
.portal-wrapper {
  height: 100vh;
  width: 100%;
  position: relative;
}

/* Orb Position (adjust top % if needed) */
.orb-link {
  position: absolute;
  left: 50%;
  top: 48%;   /* 👈 This centers it in gate opening */
  transform: translate(-50%, -50%);
  width: clamp(160px, 16vw, 260px);
  height: clamp(160px, 16vw, 260px);
  display: block;
}

/* Orb Core */
.orb {
  position: absolute;
  inset: 0;

  border-radius: 46% 54% 52% 48% / 55% 45% 58% 42%;

  background:
    radial-gradient(closest-side at 45% 40%,
      rgba(255,240,190,1),
      rgba(255,210,120,0.95) 40%,
      rgba(220,80,40,0.35) 70%,
      rgba(0,0,0,0) 78%
    );

  filter:
    drop-shadow(0 0 25px rgba(255,220,140,0.9))
    drop-shadow(0 0 90px rgba(230,80,40,0.7));

  animation: breathe 4s ease-in-out infinite;
}

/* Soft Expanding Glow */
.floor-glow {
  position: absolute;
  width: 550%;
  height: 380%;
  left: 50%;
  top: 170%;
  transform: translate(-50%, -50%);
  pointer-events: none;

  background:
    radial-gradient(closest-side,
      rgba(255,210,120,0.4) 0%,
      rgba(255,210,120,0.25) 25%,
      rgba(220,80,40,0.12) 45%,
      rgba(0,0,0,0) 70%
    );

  filter: blur(30px);
  opacity: 0.85;

  animation: glowBreath 4s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% {
    transform: scale(1);
    opacity: 0.75;
    filter:
      drop-shadow(0 0 25px rgba(255,220,140,0.8))
      drop-shadow(0 0 70px rgba(230,80,40,0.6));
  }
  50% {
    transform: scale(1.22);
    opacity: 1;
    filter:
      drop-shadow(0 0 45px rgba(255,240,190,1))
      drop-shadow(0 0 150px rgba(230,80,40,1));
  }
}

@keyframes glowBreath {
  0%, 100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.3);
    opacity: 1;
  }
}

@media (prefers-reduced-motion: reduce) {
  .orb, .floor-glow {
    animation: none;
  }
}
</style>
</head>

<body>

<div class="portal-wrapper">
  <a href="#" class="orb-link">
    <div class="orb"></div>
    <div class="floor-glow"></div>
  </a>
</div>

</body>
</html>
